body:
  text: 西塍集宋宋伯仁撰嘉熈戊戌家馬塍稿四十役役人間世齊頭四十年讀書雖未已作事亦徒然宦業蕉中鹿生涯葉底蟬願逢時務好一榻醉時眠寓目暖風輕撥繡簾開放入䨇䨇紫燕來燕子似於人有舊細銜花片落粧臺晝錦逢春漸漸長博山添爇半匙香梅花一片嬌無力自趂晴風過粉墻久雨暗數春來雨曽無兩日晴樹連山莫辨橋與水俱平閉户惟便懶逢人且問耕海棠花落盡顦悴㡬流鶯訪髙菊磵可惜呉中不見君短篷空載一溪雲知君已到孤山下日日梅花酒半醺張監稅新居爲愛溪頭只兩家也來隨分作生涯依山築屋先栽栁買地爲園旋種花聊把功名循世態只慿詩酒度年華與梅一夜論心事石鼎茶乾月未斜尋孫花翁東風吹雨濕西湖未許蘇堤酒䞉酤試把花翁問花訊不知花似去年無春雪不止春來雪意愈遲留又學飛綿過小樓暖逐東風雖易化猛如前月未容休鶯花消息孤詩課蠶麥生涯累客愁莫道逺人多凍殺王師亦有在邊頭無事日日溪頭看好山塵囂無一可相關梅花未必能如我花謝花開未得閒訪林可山可山無日不吟詩我欲論詩未有期㡬闕孤山明月下手援梅蕋立多時簡施芸隠雪後東風作峭寒客懐零亂客眉攢杭州雖近西湖月寧似湖州把釣竿丁家村不滿十來家門閭半似柴日烘蘭入鼻風掠草侵鞋土酒融春興行歌放客懐何須髙買屋一一近天街再㑹夏石芝自與君相别駸駸已數年一緘書不寄千里夢徒然雨店花新長風櫺月㡬圓嶺梅無恙否愁滿髩絲邊舊同官張法曹熬波同看楚天秋多少艱難説未休今日闕依湖栁住夢中猶怕踏邊頭雪後暖地難爲雪春天易得晴落梅狂客意啼鳥故園聲愁樂從他事湖山寄此生願将身與世渾似栁梢輕紙鷂弄假如真舞碧空吹嘘全在一絲風唯慚尺五天将近猶在兒童掌握中湖上新晴湖邊膏雨弄晴時桃杏争紅錦一機楊栁也如新及第向人争舞緑羅衣晩春溪行迴文青山數里一溪横片片花邊舞燕輕耕遍水田新雨足晴天晩色栁風清悶甚酴醿開已殘忩户尚輕寒徃事多成拙清尊强自寛對妻憐病乆顧影易心酸更展淵明集從頭仔細看雨中終日翻盆雨池亭晩更凉對琴思古意釃酒惜韶光緑漲便鷗懶花殘笑蝶忙髙田皆可插好與報君王妙智庵結屋古山顛源流未有年便非真隱者且喜得安然石洞雲同卧茶鐺客對煎我來聊小憩詩滿夕陽天嘲不識字難字逢人問村中一小兒璋麞寧易辨亥豕似堪疑鹵莽莽字音畆元非莽草莽莽字母黨切宿莽莽字音母耕犁十二齊犂字耕田噐音黎别是犁六脂犁字牛駁文良脂切識丁何足道煮字不充饑村學究八九頑童一草廬土朱勤㸃七言書晩聽學長吹樵笛國子先生殆不如讀林可山西湖衣鉢梅花花下月黄昏獨自行歌掩竹門只爲梅花全屬我不知和靖有仍孫寄樓雲卧雲卧西湖又㡬年吟鞍多在酒罏邊定知今古皆春夢不把功名作宿縁芳草滿汀山帶雨黄梅落地水連天相逢未説江南事且問何時理釣舡村姑翠鬟雙妥未梳頭紡緯車邊坐欲羞㡬度採桑歸較晩阿娘疑有落花愁底事蹉跎二八年嫁時装著未周旋年年織得新絲絹又被家翁作税錢嘉熈戊戌夏復㳺海陵稿簡呉荆溪薄宦從來錯寧容著意求自慚千里夢空作一畨愁笑我人如昨知心雨未休荆溪清徹底願泊釣魚舟學館閒題據見定時俱是足苦思量處便成痴請君打退閒煩惱啜粥烹茶細和詩荅林巡檢惠詩客乆情懐惡逢人嬾説詩不堪秋到後将近燕來時欹枕皆歸夢同心只舊知淵明籬下菊誰伴傲霜枝秋花鳯兒花雜雁來紅更有雞冠弄紫㲨可笑倚闌人醉後只将青眼看芙蓉早秋囘文秋天一餉晩風凉笑語人傳早稻香樓上醉時簾半巻愁添客鬢兩蒼蒼别友人集唐人句菊花村晩鴈來天僧朋來同徃蘭舟未十年許渾今日送君須盡醉賈至離人獨上洞庭船李頻對菊少有惺惺得到頭此心何苦嬾方収五湖煙雨常如昔一捻功名自不由世事莫将真箇看客程難作舊時留人間豈欠淵明闕見著黄花便合羞累字戲作解愁吟簡舊同寮愁知不空白頭心事驚秋歸興滿滄洲貂蟬雖出兠鍪功名有愧黒貂裘夷齊與盗蹠總荒邱無非蘧蘧栩栩夢莊周空教笑倒江上煙雨汀鷗一琴一劒一童一鶴一茶甌自不須苦苦髙卧元龍百尺樓著眼看翻雲覆雨處豪傑總成羞牙旗金甲蹇驢破㡌窮通一任前修五湖千萬頃明月則儘可棹歌横釣舟蘇州有感秋意滿姑蘇扁舟憶五湖鈴聲邊報急帆影客心孤野港青如染遙山淡欲無英雄應念我時事滿銀鬚棋亂鵶飛鷺勢縱横對面機心豈易萌一著錯時都是錯寧無冷眼看輸嬴水邊聞雁偶集四靈句蘆花新有雁徐靈暉四面水連天徐靈淵清浄非人世趙靈秀吾詩詠不全翁靈舒嘲醉者李白日斟三百盞醉時寧記脱朝靴一千八十萬杯酒百歲消磨未是多村又是江南割稻天家家兒女笑相牽芙蓉占斷清溪水獨許漁人醉艤船離維揚不爲鱸魚憶故鄉只縁心事近重陽髩絲添得三分白空被黄花笑一場維揚萬花園趙制使經理細栁營基鎖緑苔萬花新種小亭臺芙蓉喜見江南客故向西風一夜開雨中逺望山匝濃雲水匝天秋容黯淡荻花邊瀟湘八景誰収去留下波心小釣船勸僧還鄉六言世事無過爾爾禪心只好休休江上數峯如削西風不礙歸舟舟中九日巴得重陽未到家短篷根底憶黄花烏紗不爲西風舞空與同舟説孟嘉嘉熈戊戌已亥馬塍稿安居窮通豈在苦勞神且作安居嬾散人買地種花多種竹煮茶邀客也邀隣求名豈識書三上得興無過醉一巡喜得滿􅓕収芋栗杜陵應不笑全貧有感忩户清清半掩門小兒揩淚立黄昏㡬多心事無人問獨有梅花月半痕聽琴静夜聽鳴琴秋風動幽谷何爲鍾子期千古無人續楮先生先生邂逅龍亭日多少雲仍滿世間千古典謨文獨記九流毫髪事相關代庖阿堵名尤重製甲防邊職未閒只與道人爲鶴帳始能清夢繞湖山歲旦己亥嘉熈三年居閒無賀客早起只如常桃板隨人換梅花隔歲香春風回笑語雲氣卜豐穰栢酒何勞勸心平壽自長五老儒將農漁女壯年期佐漢中興豈謂蟠螭睡不醒可惜滿床廷對稿白頭翻録道家經老儒髀肉豐腴髩髮疎將軍健飯待何如七擒不了中原事羞讀君王問勞書老將齒髪俱無背已駝雨耕摩破㡬青蓑髙皇慶壽推恩詔暗讀全文忘不多老農短髪衰髯一棹船白頭波浪㡬掀天兒孫各占蘆花住網得鱸魚即酒錢老漁著破箱中欲嫁衣翠顰何止只憂葵春來偷摘斑斑髪淚濕菱花只自知老女逺訪友人不遇留集句小絶寒食花枝插滿頭范成大長亭掻首晩悠悠鄭毅夫灞陵老子無人識王竒别是天涯一段愁陸㳺寄征夫待君君未歸寄書書不去寄書書可去有意殊難語深夜彈琵琶思君在何處知君在何處不禁春事已闌珊東風吹起楊花絮東風吹落楊花絮客樓戲集唐人句門掩楊花一夜風杜牧之自憐羇客尚飄蓬李山甫不堪吟罷東回首僧朋來鳥傍岩花戲晩紅杜荀鶴贈僧了性雖然年紀小胸次已江湖貝葉連宵看梅花一様癯記詩誠敢許戒酒恐應無好向蘇堤上行行搯數珠醉中登樓明主何嘗棄浩然杯中有物且隨縁倚樓心事誰消遣一㸃飛禽落釣舡嘲燕年來乳燕亦堪羞不學楊花得自由飛過㡬家門户去直須尋見最髙樓瓶梅南枝斜插右軍持瘦影參差落硯池莫道人家忩户暖等閒忘却隴頭時春半春到已多時逰人替衲衣栁眠鶯喚醒花瘦雨添肥官事癡能了人情乆易非一貧能自守嬴得掩柴扉散愁四首著意功名四十年栁花空滿鬢絲邊男兒無補朝廷事有愧饑餐困即眠小樓呼酒揖青山翠碧瓏璁一笑間山若有情應問我如何猶似野人閒清貧如水儘無妨只願伊周立廟堂扶起太平千載脈且隨農父樂耕桑旋買犁鋤學種田一聲長嘯霅溪邊微茫白水山如畫好個江南萬里天午睡午夢驚回笋簟凉坦夷襟度即瀟湘詩髙自與梅花好食淡方知菜味長事説萬端皆畫虎人無一念不亡羊滿頭飛絮春零亂莫笑狂夫老更狂酒邊一醉復一醉陶陶醉未休何傷於日月知我者春秋萬事難追昔千金不解愁白鷗飛浩蕩此興屬漁舟小舟晩賞荷花囘文天浮月影水浮天路繞山頭樹繞煙船小小行人意適藕花新索酒杯傳清明插栁清明是處插垂楊院宇深深緑翠藏心地不爲塵俗累不簪楊栁也何妨晩春風甃殘花滿地紅别離樽俎謾匆匆春光未肯収心去却在荼䕷細影中緑陰陰裏惜韶華自縳筠梢掃落花可笑逰人心未嬾杜鶻啼處撥琵琶清和詩債還無足家園亦倦看客逰宜致仕午睡當之官舌笑張儀在心憑達磨安清和天氣好應免夾衣寒乆坐坐乆如忘世松忩日未斜營巢鵶蹂樹作夢蝶眠花易課推三畫醫方録數家瓶笙聲未絶更㸃土山茶戲作青梅黄盡雨無多栁影重重午日過忽聽隔籬人語笑採蓮船子上新河玉泉寺金魚金鱗韜隱已多時寺壁重泥又有詩龍若乆懐霖雨志不應蟠屈小方池僻居居僻恬無事開軒揖晩晴雨酖雲脚重風約燕身輕有子争梨栗無朋問死生每憂人載酒剝啄打門聲倦吟競病推敲欲嘔心何妨危坐折桐陰新蟬咽咽知人意學我年來抱膝吟云云休將閒耳聽云云只作深居耳不聞素志肯隨時節改清貧難許利名分忘情茒屋無非燕著脚春山獨是雲試問急流誰勇退故園同看木欣欣愁愁懐難盡亦難詩唯有流鶯暗得知我亦無言鶯不語栁邊相看立多時蓼花秋到梧桐我未宜蓼花何事已先知朝來數㸃西風雨喜見深紅四五枝嬾嬾嬾嬾復嬾而今嬾更宜此身聊復爾萬事欲何之尚覺瓢爲贅奚煩鍤自隨客來眠正熟裙幅任題詩書座左天地一蘧廬吾身自巻舒翁能從失馬子亦豈知魚謹獨甘居陋安貧且飯蔬昨非今未是寧不賦歸歟書座右蠻觸小功名須教一念輕受知思報飯臨事貴懲羮壽域惟仁宅心田以道耕泰然忘物我無使狎鷗驚凉不擬西風一頓凉看看凉近木樨香人家未得征夫信早有砧聲怯鴈行荷花六言緑盖半篙新雨紅香一㸃清風天賦本根如玉濂溪以道心同扇帥璋今有㡬家同名重蒲葵價亦穹髹柄但誇千縷骨不知曽未掩西風中秋月只與閒時月一般寧知今夕最團欒竹邊藉柄還如扇花下傳杯可當盤野兔易忘終夜夢林烏未許一枝安人生㡬箇中秋月那得多將笑眼看席上有舉東坡集歸去來字成詩十首醉中戲續一首傲世欲何求歸來已倦逰琴書聊自嘯丘壑復相留問菊時攜酒乗風或棹舟樂天良有以心事老田疇漁父吟小舟如雁許稳稳下波心蓑笠㡬風雨江山無古今清歌鳴短棹紅葉滿疎林一醉不知世前村月未沈秋風秋風巻秋葉秋思滿秋天骨立山如削聲低雁欲眠客愁無暇日農事喜豐年説著鱸蓴事歸心滿釣船聽雨凍雨瀟瀟未肯晴洒忩聲似煮茶聲山童酤得隣家酒炒栗壚頭獨自傾村田樂打稻天如二月天滿村和氣樂豐年田翁爛醉身如舞兩个兒童策上船問楳癡風衮衮送寒來竹裏人家總未開唯有老岩心事苦瘦笻敲雪問梅腮山下山下六七里山前八九家家家清到骨只賣水仙花落葉巻地西風促雨來埽除黄葉滿蒼苔垂楊早有青青眼只碍楳花未放開梅蘭清標同插右軍持清似西山凍餒時嚼蕋弄香無説處屈平和靖已何之佳人歌淡勻粉淺畫眉髩邊休插桃花枝白面郎君馬如箭回頭再盼情依依文君未識相如面朱絃聲裏猶相戀風流勝事千古傳寧如文君當時深深深處深庭院臨卭亦免王孫怨佳人佳人休巻簾門外落花春正甜綉床午困語聲寂博山篆冷香頻添佳人噫佳人吁今人安得人人魯秋胡黄金不認美丈夫醜女歌梳風楊栁笑沐雨杏花羞看看三十餘不敢下粧樓待媒媒不來對娘娘共哭何時王右軍來坦東床腹君不見西施絶色天下白能使麋鹿走呉宫玉環一笑百媚生能使漁陽鞞鼓驚𤣥宗無鹽無鹽形貌惡當時一段議論千古生清風美婦未必美所美貌徒美醜婦未必醜所醜行不醜醜妻惡妾壽乃翁何須能勸羊羔酒西塍集
